os:
  editPreset: "nvim-remote"

git:
  autoFetch: false

gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#ff9e64"
      - "bold"
    inactiveBorderColor:
      - "#27a1b9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"

customCommands:
  # Create worktree from current branch (when in worktrees view)
  - key: "N"
    context: "worktrees"
    description: "Create new worktree from current branch"
    prompts:
      - type: "input"
        title: "Create a new worktree from {{ .CheckedOutBranch.Name }} with what name?"
        key: "Name"
        initialValue: ""
    command: "git worktree add ../{{ .Form.Name }} {{ .CheckedOutBranch.Name }} -b {{ .Form.Name }}"

  # Create worktree from selected branch (when in branches view)
  - key: "N"
    context: "localBranches"
    description: "Create worktree for selected branch"
    command: "git worktree add ../{{ .SelectedLocalBranch.Name }} {{ .SelectedLocalBranch.Name }}"

  # Open worktree in MPOS tmux session (from worktrees view)
  - key: "<c-o>"
    context: "worktrees"
    description: "Open worktree in MPOS tmux session"
    command: "~/.dotfiles/scripts/wt-open.sh {{ .SelectedWorktree.Path }}"
    output: "terminal"

  # Open worktree in MPOS tmux session (from branches view)
  - key: "<c-o>"
    context: "localBranches"
    description: "Open worktree in MPOS tmux session"
    command: "~/.dotfiles/scripts/wt-open.sh {{ .SelectedLocalBranch.Name }}"
    output: "terminal"

  # Remove worktree and kill its tmux session
  - key: "D"
    context: "worktrees"
    description: "Remove worktree and kill tmux session"
    prompts:
      - type: "confirm"
        title: "Remove worktree '{{ .SelectedWorktree.Name }}' and kill its tmux session?"
    command: "tmux kill-session -t mpos-{{ .SelectedWorktree.Name }} 2>/dev/null; git worktree remove {{ .SelectedWorktree.Path }} --force"
